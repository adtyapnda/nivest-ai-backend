services:
  - type: web
    name: nivest-ai-backend
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8000
      - key: CORS_ORIGINS
        value: https://nivestai-demo-38721.netlify.app,http://localhost:5173,http://127.0.0.1:5173
      - key: ENABLE_LIVE_MARKET
        value: "1"
      - key: ENABLE_LIVE_NEWS
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      # Set to a postgresql:// URL from Supabase (Settings → Database → Connection string → URI).
      # Use the **Transaction pooler** URL (port 6543) for best compatibility with Render's free tier.
      # Leave unset to fall back to ephemeral SQLite (demo only — data wipes on each restart).
      - key: DATABASE_URL
        sync: false
