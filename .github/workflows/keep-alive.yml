name: Keep Render alive

on:
  schedule:
    # Every 10 minutes — keeps the Render free instance from sleeping
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://nivest-ai-backend.onrender.com/)
          echo "Backend responded with HTTP $status"
          test "$status" = "200"
